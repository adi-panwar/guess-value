<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500">

    <section class="w-full max-w-md mx-4 p-6 rounded-2xl backdrop-blur-lg bg-white/20 shadow-2xl border border-white/30 text-center">

        <h1 class="text-2xl md:text-3xl font-bold text-white mb-2">
            🤷‍♀️ Guess the Number
        </h1>

        <h1 class="text-white/80 mb-4">
            Enter a number between 1 to 100
        </h1>

        
        <p class="p-3 mb-4 font-semibold text-lg rounded-lg bg-white/20 text-white transition-all duration-300"></p>

       
        <form class="flex flex-col sm:flex-row gap-3">

            <input 
                type="number" 
                class="flex-1 p-3 rounded-lg outline-none border-none bg-white/80 focus:ring-2 focus:ring-pink-400 text-gray-800"
                placeholder="Enter your number"
                required
            >

            <button 
                type="submit" 
                class="px-5 py-3 rounded-lg bg-black/80 text-white hover:bg-black transition duration-300 active:scale-95"
            >
                Submit
            </button>

        </form>

    </section>

    <script src="main.js"></script>

</body>
</html>
